name: Textend
options:
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
settings:
  base:
    SWIFT_VERSION: 6.0
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    DEVELOPMENT_TEAM: 349WFX4WJR
    CURRENT_PROJECT_VERSION: 12
    MARKETING_VERSION: 1.2
    TARGETED_DEVICE_FAMILY: "1,2"
targets:
  Textend:
    type: application.messages
    platform: iOS
    deploymentTarget: "16.0"
    info:
      path: Textend/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
    sources:
      - path: Textend
        excludes:
          - AppDelegate.swift
    dependencies:
      - target: MessagesExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jwitapps.textend

  MessagesExtension:
    type: app-extension.messages
    platform: iOS
    deploymentTarget: "16.0"
    info:
      path: MessagesExtension/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: Textend
        MSMessagesExtensionStoreIconName: Messages Icon
        NSExtension:
          NSExtensionAttributes: {}
          NSExtensionPointIdentifier: com.apple.message-payload-provider
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).MessagesViewController"
    sources:
      - path: MessagesExtension
      - path: Sources/TextendCore
      - path: Sources/TextendUI
      - path: Sources/TextendRendering
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jwitapps.textend.MessagesExtension
        ASSETCATALOG_COMPILER_APPICON_NAME: Messages Icon

  TextendHarness:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    info:
      path: Harness/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: ""
    sources:
      - path: Harness
      - path: Sources/TextendCore
      - path: Sources/TextendUI
      - path: Sources/TextendRendering
      - path: Textend/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jwitapps.textend.harness
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

schemes:
  Textend:
    build:
      targets:
        Textend: all
    run:
      config: Debug
    archive:
      config: Release
  TextendMessages:
    build:
      targets:
        Textend: all
        MessagesExtension: all
    run:
      config: Debug
      executable: Textend
    archive:
      config: Release
  TextendHarness:
    build:
      targets:
        TextendHarness: all
    run:
      config: Debug
    archive:
      config: Release
